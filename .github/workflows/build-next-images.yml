name: Build Next Images

on:
  workflow_dispatch:

concurrency:
  group: build-next-images
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-next-images:
    if: ${{ github.repository_owner != 'getarcaneapp' && github.actor !=
      'getarcaneappbot' }}
    runs-on: depot-ubuntu-24.04-8

    env:
      MANAGER_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/arcane
      MANAGER_IMAGE_ALIAS: ghcr.io/${{ github.repository_owner }}/manager
      AGENT_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/arcane-headless
      AGENT_IMAGE_ALIAS: ghcr.io/${{ github.repository_owner }}/agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Just
        uses: taiki-e/install-action@just

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Set up Depot CLI
        uses: depot/setup-action@v1
        env:
          DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup depot buildx driver
        id: setup-buildx-driver
        run: |
          depot configure-docker

      - name: Set Short Git Commit SHA
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 #v7.0.0
        with:
          distribution: goreleaser-pro
          version: "~> 2"
          args: release --clean --nightly --skip=announce,validate,homebrew
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          BUILD_NEXT: "true"
          SKIP_RELEASE: "true"
          SKIP_CHANGELOG: "true"
          GORELEASER_CURRENT_TAG: next-static-${{ steps.vars.outputs.sha_short }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Manager image metadata
        id: manager-meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.MANAGER_IMAGE_NAME }}
            ${{ env.MANAGER_IMAGE_ALIAS }}
          tags: |
            type=raw,value=next
            type=raw,value=next-${{ steps.vars.outputs.sha_short }}
          labels: |
            org.opencontainers.image.authors=OFKM Technologies
            org.opencontainers.image.url=https://github.com/getarcaneapp/arcane
            org.opencontainers.image.documentation=https://github.com/getarcaneapp/arcane/blob/main/README.md
            org.opencontainers.image.source=https://github.com/getarcaneapp/arcane
            org.opencontainers.image.version=next-${{ steps.vars.outputs.sha_short }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=BSD-3-Clause
            org.opencontainers.image.ref.name=arcane
            org.opencontainers.image.title=Arcane
            org.opencontainers.image.description=Modern Docker Management, Made for Everyone
            com.getarcaneapp.arcane=true

      - name: Build and push manager image
        id: manager-build
        uses: depot/build-push-action@v1.17.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.manager-meta.outputs.tags }}
          labels: ${{ steps.manager-meta.outputs.labels }}
          build-args: |
            VERSION=next-${{ steps.vars.outputs.sha_short }}
            REVISION=${{ github.sha }}
          sbom: true
          provenance: true

      - name: Sign manager image
        run: cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${MANAGER_IMAGE_NAME}@${{ steps.manager-build.outputs.digest }}" "${MANAGER_IMAGE_ALIAS}@${{ steps.manager-build.outputs.digest }}"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: Agent image metadata
        id: agent-meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.AGENT_IMAGE_NAME }}
            ${{ env.AGENT_IMAGE_ALIAS }}
          tags: |
            type=raw,value=next
            type=raw,value=next-${{ steps.vars.outputs.sha_short }}
          labels: |
            org.opencontainers.image.authors=OFKM Technologies
            org.opencontainers.image.url=https://github.com/getarcaneapp/arcane
            org.opencontainers.image.documentation=https://github.com/getarcaneapp/arcane/blob/main/README.md
            org.opencontainers.image.source=https://github.com/getarcaneapp/arcane
            org.opencontainers.image.version=next-${{ steps.vars.outputs.sha_short }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=BSD-3-Clause
            org.opencontainers.image.ref.name=arcane-agent
            org.opencontainers.image.title=Arcane Agent
            org.opencontainers.image.description=Arcane Agent
            com.getarcaneapp.arcane=true
            com.getarcaneapp.arcane.agent=true

      - name: Build and push agent image
        id: agent-build
        uses: depot/build-push-action@v1.17.0
        with:
          context: .
          file: docker/Dockerfile-agent
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.agent-meta.outputs.tags }}
          labels: ${{ steps.agent-meta.outputs.labels }}
          build-args: |
            VERSION=next-${{ steps.vars.outputs.sha_short }}
            REVISION=${{ github.sha }}
          sbom: true
          provenance: true

      - name: Sign agent image
        run: cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${AGENT_IMAGE_NAME}@${{ steps.agent-build.outputs.digest }}" "${AGENT_IMAGE_ALIAS}@${{ steps.agent-build.outputs.digest }}"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
