name: Release New Arcane Version

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  attestations: write
  artifact-metadata: write
  id-token: write

jobs:
  release:
    runs-on: depot-ubuntu-latest

    env:
      MANAGER_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/arcane
      MANAGER_IMAGE_ALIAS: ghcr.io/${{ github.repository_owner }}/manager
      AGENT_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/arcane-headless
      AGENT_IMAGE_ALIAS: ghcr.io/${{ github.repository_owner }}/agent

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Set up Depot CLI
        uses: depot/setup-action@v1

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Frontend Dependencies
        run: just deps install frontend

      - name: Build Arcane Frontend
        run: just build single frontend

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: |
            backend/go.sum
            cli/go.sum

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Manager image metadata
        id: manager-meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.MANAGER_IMAGE_NAME }}
            ${{ env.MANAGER_IMAGE_ALIAS }}
          tags: |
            type=semver,pattern={{version}},prefix=v
            type=semver,pattern={{major}}.{{minor}},prefix=v
            type=semver,pattern={{major}},prefix=v
            type=raw,value=latest
          labels: |
            org.opencontainers.image.authors=OFKM Technologies
            org.opencontainers.image.url=https://github.com/getarcaneapp/arcane
            org.opencontainers.image.documentation=https://github.com/getarcaneapp/arcane/blob/main/README.md
            org.opencontainers.image.source=https://github.com/getarcaneapp/arcane
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=BSD-3-Clause
            org.opencontainers.image.ref.name=arcane
            org.opencontainers.image.title=Arcane
            org.opencontainers.image.description=Modern Docker Management, Made for Everyone
            com.getarcaneapp.arcane=true

      - name: Build and push manager image
        id: manager-build
        uses: depot/build-push-action@v1.18.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/riscv64
          push: true
          tags: ${{ steps.manager-meta.outputs.tags }}
          labels: ${{ steps.manager-meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
          sbom: true
          provenance: true

      - name: Sign manager image
        run: cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${MANAGER_IMAGE_NAME}@${{ steps.manager-build.outputs.digest }}" "${MANAGER_IMAGE_ALIAS}@${{ steps.manager-build.outputs.digest }}"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: Agent image metadata
        id: agent-meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.AGENT_IMAGE_NAME }}
            ${{ env.AGENT_IMAGE_ALIAS }}
          tags: |
            type=semver,pattern={{version}},prefix=v
            type=semver,pattern={{major}}.{{minor}},prefix=v
            type=semver,pattern={{major}},prefix=v
            type=raw,value=latest
          labels: |
            org.opencontainers.image.authors=OFKM Technologies
            org.opencontainers.image.url=https://github.com/getarcaneapp/arcane
            org.opencontainers.image.documentation=https://github.com/getarcaneapp/arcane/blob/main/README.md
            org.opencontainers.image.source=https://github.com/getarcaneapp/arcane
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=BSD-3-Clause
            org.opencontainers.image.ref.name=arcane-agent
            org.opencontainers.image.title=Arcane Agent
            org.opencontainers.image.description=Arcane Agent
            com.getarcaneapp.arcane=true
            com.getarcaneapp.arcane.agent=true

      - name: Build and push agent image
        id: agent-build
        uses: depot/build-push-action@v1.18.0
        with:
          context: .
          file: docker/Dockerfile-agent
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/riscv64
          push: true
          tags: ${{ steps.agent-meta.outputs.tags }}
          labels: ${{ steps.agent-meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
          sbom: true
          provenance: true

      - name: Sign agent image
        run: cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${AGENT_IMAGE_NAME}@${{ steps.agent-build.outputs.digest }}" "${AGENT_IMAGE_ALIAS}@${{ steps.agent-build.outputs.digest }}"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: Container image attestation (manager)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.MANAGER_IMAGE_NAME }}
          subject-digest: ${{ steps.manager-build.outputs.digest }}
          push-to-registry: true

      - name: Container image attestation (manager alias)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.MANAGER_IMAGE_ALIAS }}
          subject-digest: ${{ steps.manager-build.outputs.digest }}
          push-to-registry: true

      - name: Container image attestation (agent)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.AGENT_IMAGE_NAME }}
          subject-digest: ${{ steps.agent-build.outputs.digest }}
          push-to-registry: true

      - name: Container image attestation (agent alias)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.AGENT_IMAGE_ALIAS }}
          subject-digest: ${{ steps.agent-build.outputs.digest }}
          push-to-registry: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: '~> v2'
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.ARCANE_BOT_TOKEN }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          DISCORD_WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
          DISCORD_WEBHOOK_TOKEN: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false
