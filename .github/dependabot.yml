version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
    patterns: ["*"]
    cooldown:
      default-days: 2
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "17:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
    open-pull-requests-limit: 99
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      tanstack-table:
        applies-to: version-updates
        patterns:
          - "@tanstack/svelte-table"
          - "@tanstack/table-core"

  - package-ecosystem: "gomod"
    directory: "/backend"
    patterns: ["*"]
    cooldown:
