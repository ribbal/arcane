packages:
  - frontend
  - tests
  - email-templates

packageExtensions:
  svelte-codemirror-editor@2.1.0:
    dependencies:
      "@codemirror/search": ^6.7.0

overrides:
  devalue: ">=5.8.1"
  valibot: ^1.2.0
  validator: ^13.15.22
  cookie: ^0.7.0
  next: ^16.1.7
  undici: ^6.23.0
  ajv: ">=8.18.0"
  minimatch: ">=10.2.1"
  socket.io-parser: ">=4.2.6"
  kysely: ">=0.28.14"
  effect: ">=3.20.0"
  picomatch: ">=4.0.4"
  brace-expansion: ">=5.0.5"
  smol-toml: ">=1.6.1"
  postcss: ">=8.5.10"
  uuid: ">=11.1.1"
  fast-uri: ">=3.1.2"
  ws: ">=8.20.1"
allowBuilds:
  "@tailwindcss/oxide": true
  esbuild: true
  sharp: true
minimumReleaseAgeExclude:
  - prettier-plugin-svelte@4.0.1
  - '@fallow-cli/darwin-arm64@2.89.0'
  - '@fallow-cli/darwin-x64@2.89.0'
  - '@fallow-cli/linux-arm64-gnu@2.89.0'
  - '@fallow-cli/linux-arm64-musl@2.89.0'
  - '@fallow-cli/linux-x64-gnu@2.89.0'
  - '@fallow-cli/linux-x64-musl@2.89.0'
  - '@fallow-cli/win32-arm64-msvc@2.89.0'
  - '@fallow-cli/win32-x64-msvc@2.89.0'
  - fallow@2.89.0
