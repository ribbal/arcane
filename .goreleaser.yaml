# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
# vim: set ts=2 sw=2 tw=0 fo=jcroql
version: 2
pro: true

project_name: arcane

git:
  ignore_tag_prefixes:
    - backend/
    - cli/
    - types/

before:
  hooks:
    - just deps install all
    - just build single frontend

builds:
  - id: arcane
    main: ./cmd/main.go
    dir: backend
    binary: arcane
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - "386"
      - arm
    goarm:
      - "7"
    goamd64:
      - v1
    go386:
      - sse2
    ldflags:
      - -w -s
      - -buildid={{ .Version }}
      - -X github.com/getarcaneapp/arcane/backend/internal/config.Version={{ .Version }}
      - -X github.com/getarcaneapp/arcane/backend/internal/config.Revision={{ .ShortCommit }}
      - -X github.com/getarcaneapp/arcane/backend/internal/config.BuildTime={{ .Date }}
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: arcane-agent
    main: ./cmd/main.go
    dir: backend
    binary: arcane-agent
    tags:
      - exclude_frontend
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - "386"
      - arm
    goarm:
      - "7"
    goamd64:
      - v1
    go386:
      - sse2
    ldflags:
      - -w -s
      - -buildid={{ .Version }}
      - -X github.com/getarcaneapp/arcane/backend/internal/config.Version={{ .Version }}
      - -X github.com/getarcaneapp/arcane/backend/internal/config.Revision={{ .ShortCommit }}
      - -X github.com/getarcaneapp/arcane/backend/internal/config.BuildTime={{ .Date }}
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: arcane-cli
    main: .
    dir: cli
    binary: arcane-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - "386"
      - arm
    goarm:
      - "7"
    goamd64:
      - v1
    go386:
      - sse2
    ldflags:
      - -w -s
      - -buildid={{ .Version }}
      - -X github.com/getarcaneapp/arcane/cli/internal/config.Version={{ .Version }}
      - -X github.com/getarcaneapp/arcane/cli/internal/config.Revision={{ .ShortCommit }}
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: arcane-cli-archive
    ids:
      - arcane-cli
    formats:
      - tar.gz
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
  - id: default
    ids:
      - arcane
      - arcane-agent
    formats:
      - binary
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"

upx:
  - enabled: true
    ids:
      - arcane
      - arcane-agent
      - arcane-cli
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - "7"
    goamd64:
      - v1
    compress: best
    lzma: true
    brute: true

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - arcane-cli
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

binary_signs:
  - id: cosign-binaries
    cmd: cosign
    ids:
      - arcane
      - arcane-agent
      - arcane-cli
    signature: '${artifact}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}.sigstore.json'
    stdin: "{{ .Env.COSIGN_PASSWORD }}"
    args:
      - sign-blob
      - --key=env://COSIGN_PRIVATE_KEY
      - --bundle=${signature}
      - "${artifact}"
      - --yes
    output: true

signs:
  - id: cosign-checksums
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    stdin: "{{ .Env.COSIGN_PASSWORD }}"
    args:
      - sign-blob
      - --key=env://COSIGN_PRIVATE_KEY
      - --bundle=${signature}
      - "${artifact}"
      - --yes
    output: true

checksum:
  extra_files:
    - glob: dist/arcane-cli_linux_amd64_v1/arcane-cli
      name_template: arcane-cli_linux_amd64
    - glob: dist/arcane-cli_linux_arm64_v8.0/arcane-cli
      name_template: arcane-cli_linux_arm64
    - glob: dist/arcane-cli_linux_386_sse2/arcane-cli
      name_template: arcane-cli_linux_386
    - glob: dist/arcane-cli_linux_arm_7/arcane-cli
      name_template: arcane-cli_linux_armv7
    - glob: dist/arcane-cli_darwin_amd64_v1/arcane-cli
      name_template: arcane-cli_darwin_amd64
    - glob: dist/arcane-cli_darwin_arm64_v8.0/arcane-cli
      name_template: arcane-cli_darwin_arm64

nightly:
  version_template: "0.0.0-next.{{ .ShortCommit }}"

nfpms:
  - id: arcane-cli
    package_name: '{{ if eq (index .Env "BUILD_NEXT") "true" }}arcane-cli-next{{ else }}arcane-cli{{ end }}'
    file_name_template: "{{ .ConventionalFileName }}"
    ids:
      - arcane-cli
    vendor: getarcaneapp
    homepage: https://getarcane.app
    maintainer: Kyle Mendell <ksm@ofkm.us>
    description: |-
      Arcane CLI - Modern Docker Management, Designed for Everyone.
      This is the command-line interface for Arcane.
    license: BSD-3-Clause
    formats:
      - apk
      - deb
      - rpm
      - archlinux
    bindir: /usr/bin
    contents:
      - src: ./cli/README.md
        dst: '/usr/share/doc/{{ if eq (index .Env "BUILD_NEXT") "true" }}arcane-cli-next{{ else }}arcane-cli{{ end }}/README.md'
      - src: ./LICENSE
        dst: '/usr/share/doc/{{ if eq (index .Env "BUILD_NEXT") "true" }}arcane-cli-next{{ else }}arcane-cli{{ end }}/LICENSE'

publishers:
  - name: nexus-debian
    if: '{{ hasSuffix .ArtifactName ".deb" }}'
    disable: '{{ if not (and (index .Env "NEXUS_USERNAME") (index .Env "NEXUS_PASSWORD")) }}true{{ end }}'
    dir: "{{ dir .ArtifactPath }}"
    cmd: >-
      curl --fail-with-body
      -u "{{ .Env.NEXUS_USERNAME }}:{{ .Env.NEXUS_PASSWORD }}"
      --upload-file "{{ .ArtifactName }}"
      'https://pkgs.getarcane.app/repository/debian/stable/{{- if eq .Arch "amd64" -}}amd64{{- else if eq .Arch "arm64" -}}arm64{{- else if eq .Arch "386" -}}i386{{- else if and (eq .Arch "arm") (eq .Arm "7") -}}armhf{{- else -}}{{ .Arch }}{{- end -}}/{{ .ArtifactName }}'

  - name: nexus-yum
    if: '{{ hasSuffix .ArtifactName ".rpm" }}'
    disable: '{{ if not (and (index .Env "NEXUS_USERNAME") (index .Env "NEXUS_PASSWORD")) }}true{{ end }}'
    dir: "{{ dir .ArtifactPath }}"
    cmd: >-
      curl --fail-with-body
      -u "{{ .Env.NEXUS_USERNAME }}:{{ .Env.NEXUS_PASSWORD }}"
      --upload-file "{{ .ArtifactName }}"
      'https://pkgs.getarcane.app/repository/yum/{{- if eq .Arch "amd64" -}}x86_64{{- else if eq .Arch "arm64" -}}aarch64{{- else if eq .Arch "386" -}}i386{{- else if and (eq .Arch "arm") (eq .Arm "7") -}}armhfp{{- else -}}{{ .Arch }}{{- end -}}/{{ .ArtifactName }}'

homebrew_casks:
  - name: arcane-cli
    ids:
      - arcane-cli-archive
    binaries:
      - arcane-cli
    generate_completions_from_executable:
      executable: arcane-cli
      args:
        - completion
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
        - fish
        - pwsh
    description: "Arcane CLI - Modern Docker Management, Designed for Everyone."
    homepage: "https://getarcane.app"
    skip_upload: '{{ if eq (index .Env "BUILD_NEXT") "true" }}true{{ end }}'
    repository:
      owner: getarcaneapp
      name: homebrew-tap
    commit_msg_template: "chore(brew): update {{ .ProjectName }} to {{ .Tag }}"

dockers_v2:
  - id: arcane-next
    ids:
      - arcane
    dockerfile: docker/next-builds/Dockerfile-static
    images:
      - "ghcr.io/getarcaneapp/arcane"
    tags:
      - "next-static"
      - "{{.Tag}}"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    labels:
      "org.opencontainers.image.authors": "OFKM Technologies"
      "org.opencontainers.image.url": "https://github.com/getarcaneapp/arcane"
      "org.opencontainers.image.documentation": "https://github.com/getarcaneapp/arcane/blob/main/README.md"
      "org.opencontainers.image.source": "https://github.com/getarcaneapp/arcane"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.licenses": "BSD-3-Clause"
      "org.opencontainers.image.title": "Arcane"
      "org.opencontainers.image.description": "Modern Docker Management, Made for Everyone"
      "com.getarcaneapp.arcane": "true"
    disable: '{{ if not (index .Env "BUILD_NEXT") }}true{{ end }}'
    sbom: true

  - id: arcane-agent-next
    ids:
      - arcane-agent
    dockerfile: docker/next-builds/Dockerfile-agent-static
    images:
      - "ghcr.io/getarcaneapp/arcane-headless"
    tags:
      - "next-static"
      - "{{.Tag}}"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    labels:
      "org.opencontainers.image.authors": "OFKM Technologies"
      "org.opencontainers.image.url": "https://github.com/getarcaneapp/arcane"
      "org.opencontainers.image.documentation": "https://github.com/getarcaneapp/arcane/blob/main/README.md"
      "org.opencontainers.image.source": "https://github.com/getarcaneapp/arcane"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.licenses": "BSD-3-Clause"
      "org.opencontainers.image.title": "Arcane Agent"
      "org.opencontainers.image.description": "Arcane Agent"
      "com.getarcaneapp.arcane.agent": "true"
    disable: '{{ if not (index .Env "BUILD_NEXT") }}true{{ end }}'
    sbom: true

  - id: arcane-next-distroless
    ids:
      - arcane
    dockerfile: docker/next-builds/Dockerfile-next-distroless
    images:
      - "ghcr.io/getarcaneapp/arcane"
    tags:
      - "next-distroless"
      - "{{.Tag}}-distroless"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    labels:
      "org.opencontainers.image.authors": "OFKM Technologies"
      "org.opencontainers.image.url": "https://github.com/getarcaneapp/arcane"
      "org.opencontainers.image.documentation": "https://github.com/getarcaneapp/arcane/blob/main/README.md"
      "org.opencontainers.image.source": "https://github.com/getarcaneapp/arcane"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.licenses": "BSD-3-Clause"
      "org.opencontainers.image.title": "Arcane"
      "org.opencontainers.image.description": "Modern Docker Management, Made for Everyone"
      "com.getarcaneapp.arcane": "true"
    disable: '{{ if not (index .Env "BUILD_NEXT") }}true{{ end }}'
    sbom: true

  - id: arcane-agent-next-distroless
    ids:
      - arcane-agent
    dockerfile: docker/next-builds/Dockerfile-agent-distroless
    images:
      - "ghcr.io/getarcaneapp/arcane-headless"
    tags:
      - "next-distroless"
      - "{{.Tag}}-distroless"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    labels:
      "org.opencontainers.image.authors": "OFKM Technologies"
      "org.opencontainers.image.url": "https://github.com/getarcaneapp/arcane"
      "org.opencontainers.image.documentation": "https://github.com/getarcaneapp/arcane/blob/main/README.md"
      "org.opencontainers.image.source": "https://github.com/getarcaneapp/arcane"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.licenses": "BSD-3-Clause"
      "org.opencontainers.image.title": "Arcane Agent"
      "org.opencontainers.image.description": "Arcane Agent"
      "com.getarcaneapp.arcane.agent": "true"
    disable: '{{ if not (index .Env "BUILD_NEXT") }}true{{ end }}'
    sbom: true

docker_signs:
  - id: cosign-next-images
    cmd: cosign
    ids:
      - arcane-next
      - arcane-agent-next
      - arcane-next-distroless
      - arcane-agent-next-distroless
    stdin: "{{ .Env.COSIGN_PASSWORD }}"
    args:
      - sign
      - --key=env://COSIGN_PRIVATE_KEY
      - "${artifact}@${digest}"
      - --yes
    output: true

blobs:
  - provider: s3
    endpoint: '{{ index .Env "R2_ENDPOINT" }}'
    region: auto
    bucket: '{{ index .Env "R2_BUCKET" }}'
    directory: bin/cli-next
    extra_files_only: true
    extra_files:
      - glob: dist/arcane-cli_linux_amd64_v1/arcane-cli
        name_template: arcane-cli_linux_amd64
      - glob: dist/arcane-cli_linux_amd64_v1/arcane-cli_linux_amd64.sigstore.json
        name_template: arcane-cli_linux_amd64.sigstore.json
      - glob: dist/arcane-cli_linux_arm64_v8.0/arcane-cli
        name_template: arcane-cli_linux_arm64
      - glob: dist/arcane-cli_linux_arm64_v8.0/arcane-cli_linux_arm64.sigstore.json
        name_template: arcane-cli_linux_arm64.sigstore.json
      - glob: dist/arcane-cli_linux_386_sse2/arcane-cli
        name_template: arcane-cli_linux_386
      - glob: dist/arcane-cli_linux_386_sse2/arcane-cli_linux_386.sigstore.json
        name_template: arcane-cli_linux_386.sigstore.json
      - glob: dist/arcane-cli_linux_arm_7/arcane-cli
        name_template: arcane-cli_linux_armv7
      - glob: dist/arcane-cli_linux_arm_7/arcane-cli_linux_armv7.sigstore.json
        name_template: arcane-cli_linux_armv7.sigstore.json
      - glob: dist/arcane-cli_darwin_amd64_v1/arcane-cli
        name_template: arcane-cli_darwin_amd64
      - glob: dist/arcane-cli_darwin_amd64_v1/arcane-cli_darwin_amd64.sigstore.json
        name_template: arcane-cli_darwin_amd64.sigstore.json
      - glob: dist/arcane-cli_darwin_arm64_v8.0/arcane-cli
        name_template: arcane-cli_darwin_arm64
      - glob: dist/arcane-cli_darwin_arm64_v8.0/arcane-cli_darwin_arm64.sigstore.json
        name_template: arcane-cli_darwin_arm64.sigstore.json
      - glob: dist/arcane_next-static-*_checksums.txt
        name_template: arcane-cli_checksums.txt
    include_meta: false
    disable: '{{ if not (index .Env "BUILD_NEXT") }}true{{ end }}'

  - provider: s3
    endpoint: '{{ index .Env "R2_ENDPOINT" }}'
    region: auto
    bucket: '{{ index .Env "R2_BUCKET" }}'
    ids:
      - default
    directory: bin/arcane-next
    extra_files:
      - glob: dist/arcane_linux_amd64_v1/arcane_linux_amd64.sigstore.json
        name_template: arcane_linux_amd64.sigstore.json
      - glob: dist/arcane_linux_arm64_v8.0/arcane_linux_arm64.sigstore.json
        name_template: arcane_linux_arm64.sigstore.json
      - glob: dist/arcane_linux_386_sse2/arcane_linux_386.sigstore.json
        name_template: arcane_linux_386.sigstore.json
      - glob: dist/arcane_linux_arm_7/arcane_linux_armv7.sigstore.json
        name_template: arcane_linux_armv7.sigstore.json
      - glob: dist/arcane_darwin_amd64_v1/arcane_darwin_amd64.sigstore.json
        name_template: arcane_darwin_amd64.sigstore.json
      - glob: dist/arcane_darwin_arm64_v8.0/arcane_darwin_arm64.sigstore.json
        name_template: arcane_darwin_arm64.sigstore.json
      - glob: dist/arcane-agent_linux_amd64_v1/arcane-agent_linux_amd64.sigstore.json
        name_template: arcane-agent_linux_amd64.sigstore.json
      - glob: dist/arcane-agent_linux_arm64_v8.0/arcane-agent_linux_arm64.sigstore.json
        name_template: arcane-agent_linux_arm64.sigstore.json
      - glob: dist/arcane-agent_linux_386_sse2/arcane-agent_linux_386.sigstore.json
        name_template: arcane-agent_linux_386.sigstore.json
      - glob: dist/arcane-agent_linux_arm_7/arcane-agent_linux_armv7.sigstore.json
        name_template: arcane-agent_linux_armv7.sigstore.json
      - glob: dist/arcane-agent_darwin_amd64_v1/arcane-agent_darwin_amd64.sigstore.json
        name_template: arcane-agent_darwin_amd64.sigstore.json
      - glob: dist/arcane-agent_darwin_arm64_v8.0/arcane-agent_darwin_arm64.sigstore.json
        name_template: arcane-agent_darwin_arm64.sigstore.json
      - glob: dist/arcane_next-static-*_checksums.txt.sigstore.json
        name_template: arcane_checksums.sigstore.json
    include_meta: false
    disable: '{{ if not (index .Env "BUILD_NEXT") }}true{{ end }}'

changelog:
  disable: true

announce:
  discord:
    enabled: true
    # Default: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'.
    message_template: "Arcane version {{.Tag}} has been released! Checkout the changelog at {{ .ReleaseURL }}"
    author: "Github Actions"
    # Color code of the embed. You have to use decimal numeral system, not hexadecimal.
    color: "9320959"
    icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"

release:
  github:
    owner: getarcaneapp
    name: arcane
  disable: '{{ if index .Env "SKIP_RELEASE" }}true{{ end }}'
  draft: true
  replace_existing_draft: false
  use_existing_draft: true
  replace_existing_artifacts: true
  prerelease: auto
  make_latest: true
  mode: keep-existing
  name_template: "{{.Tag}}"
  footer: |
    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
